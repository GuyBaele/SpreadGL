name: SpreadGL One-Step CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    if: github.repository == 'FlorentLee/SpreadGL'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Backend Processing Toolkit
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: florentlee/spread.gl.processing.toolkit:2.0-beta
          cache-from: type=gha
          cache-to: type=gha,mode=max      

      - name: Build and Push Frontend Web Application
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: florentlee/spread.gl.web.page:2.0-beta
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Unified App to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove large demo directories and files not needed for the live app
          rm -rf inputdata/ outputdata/ videos/ html/
          
          # 2. Re-initialize a fresh git repo to wipe out any large files in the history
          rm -rf .git
          git init
          git config --global user.email "deploy-bot@spread.gl"
          git config --global user.name "SpreadGL Deploy Bot"
          git checkout -b main
          
          # 3. Setup Git LFS for binary files (Images, Icons, Fonts)
          git lfs install
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"
          git lfs track "*.gif"
          git lfs track "*.ico"
          git lfs track "*.woff"
          git lfs track "*.woff2"
          git add .gitattributes
          
          # 4. Add the clean files and commit
          git add .
          git commit -m "Clean deployment snapshot to Hugging Face"
          
          # 5. Push to Hugging Face (Force push to overwrite the Space)
          git remote add hf https://florentlee:${HF_TOKEN}@huggingface.co/spaces/FlorentLee98/SpreadGL
          git push hf main -f
