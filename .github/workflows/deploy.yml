name: SpreadGL One-Step CI/CD Pipeline

on:
  push:
    branches:
      - main
      - v2.0-beta

jobs:
  build-and-deploy:
    if: github.repository == 'FlorentLee/SpreadGL'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Backend Processing Toolkit
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: florentlee/spread.gl.processing.toolkit:2.0-beta

      - name: Build and Push Frontend Web Application
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: florentlee/spread.gl.web.page:2.0-beta

      - name: Deploy Unified App to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # A single, clean push of the entire repository to your main Hugging Face Space
          git remote add hf https://florentlee98:${HF_TOKEN}@huggingface.co/spaces/FlorentLee98/SpreadGL
          git push hf HEAD:main -f
